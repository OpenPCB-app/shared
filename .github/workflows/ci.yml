name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: npm install

      - name: Build all packages
        run: npm run build

      - name: Typecheck (composite)
        run: npm run typecheck

      - name: Test (bun)
        run: npm test
